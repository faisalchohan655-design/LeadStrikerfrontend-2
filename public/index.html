<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadStriker Dashboard</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f172a; 
      color: white; 
      padding: 20px;
      text-align: center;
    }
    h1 { color: #38bdf8; }
    .lead {
      background: #1e293b;
      padding: 15px;
      margin: 10px auto;
      border-radius: 8px;
      max-width: 400px;
      text-align: left;
    }
    .lead strong { color: #22c55e; }
  </style>
</head>
<body>
  <h1>📊 LeadStriker Dashboard</h1>
  <div id="leads">Loading leads...</div>

  <script>
    // Railway کا backend URL یہاں لگا دیا ہے
    const API_URL = 'https://leadstriker-production.up.railway.app/api/leads';

    async function loadLeads() {
      try {
        const res = await fetch(API_URL);
        const leads = await res.json();
        
        const container = document.getElementById('leads');
        container.innerHTML = '';
        
        leads.forEach(lead => {
          container.innerHTML += `
            <div class="lead">
              <strong>Name:</strong> ${lead.name} <br>
              <strong>Email:</strong> ${lead.email} <br>
              <strong>Phone:</strong> ${lead.phone}
            </div>
          `;
        });
      } catch (err) {
        document.getElementById('leads').innerHTML = 'Error loading leads: ' + err;
      }
    }

    loadLeads();
  </script>
</body>
</html>
